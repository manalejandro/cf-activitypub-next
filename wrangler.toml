name = "cf-activitypub"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
INSTANCE_TITLE = "CF ActivityPub"
INSTANCE_DESCRIPTION = "A federated social network powered by ActivityPub and Cloudflare"
INSTANCE_VERSION = "0.1.0"
INSTANCE_URL = "https://cf-ap.example.com"
NODE_ENV = "production"

[[routes]]
pattern = "cf-ap.example.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "cf-activitypub"
database_id = ""

[[kv_namespaces]]
binding = "KV"
id = ""

[[r2_buckets]]
binding = "R2"
bucket_name = "cf-activitypub-media"

[[queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "cf-activitypub-delivery"

[[queues.consumers]]
queue = "cf-activitypub-delivery"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[[durable_objects.bindings]]
name = "TIMELINE_STREAM"
class_name = "TimelineStreamDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TimelineStreamDO"]

[triggers]
crons = ["0 * * * *"]

[observability]
enabled = true

[dev]
port = 3000
local_protocol = "http"
