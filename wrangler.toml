name = "cf-activitypub"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
INSTANCE_TITLE = "CF ActivityPub"
INSTANCE_DESCRIPTION = "A federated social network powered by ActivityPub and Cloudflare"
INSTANCE_VERSION = "1.0.3"
INSTANCE_URL = "https://cf-ap.example.com"
NODE_ENV = "production"
# Public Turnstile site key (replace with your actual key from dash.cloudflare.com/turnstile)
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
# Sender address — must belong to a domain with Cloudflare Email Routing enabled
FROM_EMAIL = "noreply@cf-ap.example.com"
# LibreTranslate instance URL (set to empty to disable translation)
LIBRETRANSLATE_URL = ""
# Secrets: set with wrangler secret put
#   wrangler secret put TURNSTILE_SECRET
#   wrangler secret put CALLS_TURN_KEY_ID
#   wrangler secret put CALLS_API_TOKEN

[[routes]]
pattern = "cf-ap.example.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "cf-activitypub"
database_id = ""

[[kv_namespaces]]
binding = "KV"
id = ""

[[r2_buckets]]
binding = "R2"
bucket_name = "cf-activitypub-media"

# Email Workers binding for sending verification/notification emails.
# Requires Email Routing to be enabled on your Cloudflare zone.
# Docs: https://developers.cloudflare.com/email-routing/email-workers/send-email-workers/
[[send_email]]
name = "EMAIL"

[[queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "cf-activitypub-delivery"

[[queues.consumers]]
queue = "cf-activitypub-delivery"
max_batch_size = 20
max_batch_timeout = 5
max_retries = 3

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "TIMELINE_STREAM"
class_name = "TimelineStreamDO"

[[durable_objects.bindings]]
name = "CALL_SIGNALING"
class_name = "CallSignalingDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TimelineStreamDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CallSignalingDO"]

[triggers]
crons = ["* * * * *"]

[observability]
enabled = false

[dev]
port = 3000
local_protocol = "http"
